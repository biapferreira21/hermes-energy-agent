# =============================================================
# HERMES ENERGY AGENT - Fontes de informacao
# rss_feeds : recolhidos automaticamente - todos testados e confirmados
# manual_sources: scraped pelo web_scraper_collector (paginas sem RSS)
# =============================================================

rss_feeds:

  # --- PETROLEO & GAS ---
  - name: EIA Today in Energy
    url: https://www.eia.gov/rss/todayinenergy.xml
    source_type: official_data
    priority: high

  - name: Oilprice
    url: https://oilprice.com/rss/main
    source_type: energy_news
    priority: high

  - name: Rigzone
    url: https://www.rigzone.com/news/rss/rigzone_latest.aspx
    source_type: oil_gas_news
    priority: high

  - name: LNG Prime
    url: https://lngprime.com/feed/
    source_type: lng_news
    priority: high

  - name: LNG World News
    url: https://www.lngworldnews.com/feed/
    source_type: lng_news
    priority: high

  - name: Offshore Technology
    url: https://www.offshore-technology.com/feed/
    source_type: oil_gas_news
    priority: medium

  # --- CARBON & CLIMA ---
  - name: Carbon Pulse
    url: https://carbon-pulse.com/feed/
    source_type: carbon_news
    priority: high

  - name: Carbon Brief
    url: https://www.carbonbrief.org/feed/
    source_type: carbon_news
    priority: high

  - name: Climate Home News
    url: https://www.climatechangenews.com/feed/
    source_type: climate_policy
    priority: medium

  # --- RENOVAVEIS & TRANSICAO ---
  - name: PV Magazine
    url: https://www.pv-magazine.com/feed/
    source_type: renewables_news
    priority: medium

  - name: Energy Monitor
    url: https://www.energymonitor.ai/feed/
    source_type: energy_transition
    priority: medium

  # --- BLOCKCHAIN & CRIPTO ---
  - name: Ledger Insights
    url: https://www.ledgerinsights.com/feed/
    source_type: blockchain_news
    priority: high

  - name: CoinDesk
    url: https://www.coindesk.com/arc/outboundfeeds/rss/
    source_type: crypto_news
    priority: medium

  - name: CoinTelegraph
    url: https://cointelegraph.com/rss
    source_type: crypto_news
    priority: medium

  - name: The Defiant
    url: https://thedefiant.io/feed
    source_type: defi_news
    priority: medium

  - name: Decrypt
    url: https://decrypt.co/feed
    source_type: crypto_news
    priority: medium

  - name: TACO Alliance Research
    url: https://research.tacoalition.org/feed/
    source_type: rwa_data
