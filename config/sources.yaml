    url: https://www.ft.com/energy?format=rss
    source_type: financial_news
    priority: high

  # --- REGULADORES ---
  - name: ESMA News
    url: https://www.esma.europa.eu/rss.xml
    source_type: regulator
    priority: medium

# -------------------------------------------------------------
# FONTES MANUAIS - scraped automaticamente pelo web_scraper_collector
# Falhas sao silenciosas; o pipeline continua mesmo que um site bloqueie
# -------------------------------------------------------------
manual_sources:

  official_energy_data:
    - {name: IEA,            url: 'https://www.iea.org/news',                           type: official_data,   priority: high}
    - {name: OPEC,           url: 'https://www.opec.org/opec_web/en/press_room/releases.htm', type: official_data, priority: high}
    - {name: IRENA,          url: 'https://www.irena.org/News',                          type: renewables_data, priority: high}
    - {name: ENTSO-E,        url: 'https://www.entsoe.eu/news/',                         type: power_data,      priority: high}
    - {name: ENTSOG,         url: 'https://www.entsog.eu/news',                          type: gas_data,        priority: high}
    - {name: Ember,          url: 'https://ember-climate.org/insights/',                 type: power_data,      priority: medium}
    - {name: ACER,           url: 'https://www.acer.europa.eu/news',                     type: regulator,       priority: high}
    - {name: IRENA Newsroom, url: 'https://www.irena.org/newsroom/pressreleases',        type: renewables_data, priority: high}
